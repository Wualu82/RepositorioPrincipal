<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Guía de estilo</title>

  <style>

    body {

      font-family: 'Arial', sans-serif;

      margin: 0;

      padding: 0;

    }

    .color-primary {

      color: #3498db;

    }

    .button {

      background-color: #3498db;

      color: #fff;

      padding: 10px 20px;

      border: none;

      border-radius: 5px;

      cursor: pointer;

      font-size: 16px;

    }

    .button:hover {

      background-color: #2980b9;

    }

  </style>

</head>

<body>

  <h1 class="color-primary">Título Principal</h1>

  <button class="button">Botón de Ejemplo</button>

</body>

</html>
